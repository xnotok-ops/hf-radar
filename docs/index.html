<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HF Radar — Daily Digests</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:system-ui,sans-serif;background:#0a0f1a;color:#e2e8f0}
    .layout{display:flex;min-height:100vh}
    .sidebar{width:220px;background:#0d1117;border-right:1px solid #1e2130;padding:20px 0;overflow-y:auto;position:fixed;top:0;bottom:0}
    .sidebar-header{padding:0 16px 16px;border-bottom:1px solid #1e2130;margin-bottom:12px}
    .sidebar-header h1{font-family:monospace;font-size:14px;color:#f8fafc;margin-bottom:4px}
    .sidebar-header p{font-size:11px;color:#475569}
    .digest-link{display:block;padding:8px 16px;text-decoration:none;color:#94a3b8;font-family:monospace;font-size:13px;border-left:3px solid transparent}
    .digest-link:hover{background:#12141a;color:#fbbf24}
    .digest-link.active{background:#12141a;color:#fbbf24;border-left-color:#fbbf24}
    .content{margin-left:220px;flex:1;padding:32px 40px;max-width:900px}
    .content h1{font-family:monospace;font-size:22px;color:#f8fafc;margin-bottom:8px}
    .content h2{font-size:18px;color:#fbbf24;margin:24px 0 12px;padding-bottom:6px;border-bottom:1px solid #1e2130}
    .content h3{font-size:15px;color:#f59e0b;margin:16px 0 8px}
    .content p{font-size:14px;line-height:1.7;color:#cbd5e1;margin-bottom:8px}
    .content a{color:#fbbf24;text-decoration:none}
    .content a:hover{text-decoration:underline}
    .content strong{color:#f8fafc}
    .content hr{border:none;border-top:1px solid #1e2130;margin:20px 0}
    .content ul{margin:8px 0 8px 20px}
    .content li{font-size:13px;color:#94a3b8;margin-bottom:4px;line-height:1.5}
    .content table{width:100%;border-collapse:collapse;margin:12px 0;font-size:12px}
    .content td{padding:6px 10px;border:1px solid #1e2130;color:#94a3b8}
    .content tr:first-child td{background:#12141a;color:#f8fafc;font-weight:600}
    .empty-state{text-align:center;padding:80px 20px;color:#475569}
    @media(max-width:768px){
      .sidebar{width:100%;position:relative;border-right:none;border-bottom:1px solid #1e2130;display:flex;overflow-x:auto;padding:12px;gap:8px}
      .sidebar-header{display:none}
      .digest-link{padding:6px 12px;white-space:nowrap;border-left:none;font-size:12px}
      .layout{flex-direction:column}
      .content{margin-left:0;padding:20px 16px}
    }
  </style>
</head>
<body>
  <div class="layout">
    <nav class="sidebar">
      <div class="sidebar-header"><h1>🤗 HF Radar</h1><p>Daily AI trending</p></div>
      <a href="#" class="digest-link" data-file="2026-03-12.md">2026-03-12</a>
    </nav>
    <main class="content" id="content">
      <div class="empty-state">
        <div style="font-size:48px;margin-bottom:16px">🤗</div>
        <h2 style="border:none;color:#f8fafc">HF Radar</h2>
        <p>Select a date to view trending models, datasets & spaces.</p>
      </div>
    </main>
  </div>
  <script>
    var digests={};
    digests["2026-03-12.md"] = "# 🤗 HF Radar — Daily Digest\n\n**Date:** 2026-03-12  \n**Items tracked:** 0 (models + datasets + spaces)  \n**Weekly persistent:** 0 | **Monthly consistent:** 0  \n\n---\n\n## Contents\n\n- [Weekly Persistent](#weekly-persistent)\n- [Monthly Consistent](#monthly-consistent)\n- [Trending Models](#models) (0)\n- [Trending Datasets](#datasets) (0)\n- [Trending Spaces](#spaces) (0)\n\n---\n\n## 📅 Weekly Persistent\n\n> Items trending **3+ days in the last 7 days**.\n\n*Not enough data yet — need 3+ days of digests.*\n\n---\n\n## 📆 Monthly Consistent\n\n> Items trending **10+ days in the last 30 days**.\n\n*Not enough data yet — need 10+ days of digests.*\n\n---\n\n*Generated by [HF Radar](https://github.com/xnotok-ops/hf-radar) — Built by [@xnotok](https://x.com/xnotok)*\n";
    function mdToHtml(md){
      return md
        .replace(/^### (.+)$/gm,'<h3>$1</h3>')
        .replace(/^## (.+?)$/gm,'<h2>$1</h2>')
        .replace(/^# (.+)$/gm,'<h1>$1</h1>')
        .replace(/\*\*\[(.+?)\]\((.+?)\)\*\*/g,'<strong><a href="$2" target="_blank">$1</a></strong>')
        .replace(/\[(.+?)\]\((.+?)\)/g,'<a href="$2" target="_blank">$1</a>')
        .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
        .replace(/\*(.+?)\*/g,'<em>$1</em>')
        .replace(/^- (.+)$/gm,'<li>$1</li>')
        .replace(/^---$/gm,'<hr>')
        .replace(/\n/g,'<br>');
    }
    document.querySelectorAll('.digest-link').forEach(function(link){
      link.addEventListener('click',function(e){
        e.preventDefault();
        document.querySelectorAll('.digest-link').forEach(function(l){l.classList.remove('active')});
        this.classList.add('active');
        var md=digests[this.dataset.file];
        if(md)document.getElementById('content').innerHTML=mdToHtml(md);
      });
    });
    var first=document.querySelector('.digest-link');
    if(first)first.click();
  </script>
</body>
</html>
